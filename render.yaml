# Render.com Deployment Configuration
# This file tells Render how to build and run your MCQ Generator API

services:
  - type: web
    name: mcq-generator-api
    runtime: python
    plan: free  # Free tier 
    buildCommand: pip install -r requirements.txt
    startCommand: cd src && uvicorn mcq_api_service:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false  # Set this manually in Render dashboard
      - key: API_KEY
        sync: false  # Optional - set for API authentication
      - key: ALLOWED_ORIGINS
        value: "*"  # Update with your Quickbase domain in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /health
    autoDeploy: true  # Auto-deploy on git push
