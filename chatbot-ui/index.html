<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WWF Sustainability Assistant</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="wwf-logo-new.jpg">
    <link rel="shortcut icon" type="image/x-icon" href="wwf-logo-new.jpg">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Custom Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'wwf-orange': '#FF6200',
                        'wwf-teal': '#006072',      // Official WWF header teal
                        'wwf-teal-dark': '#004F5C', // Darker teal for accents
                        'wwf-black': '#000000',
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
       .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 1rem;
        }
        
        .sidebar {
            min-width: 250px;
            max-width: 500px;
            width: 320px;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .sidebar-hidden {
            transform: translateX(-100%);
            min-width: 0;
            width: 0;
        }
        
        /* Resizer handle */
        .resize-handle {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 5px;
            cursor: col-resize;
            background: transparent;
            transition: background 0.2s;
            z-index: 10;
        }
        
        .resize-handle:hover {
            background: rgba(0, 96, 114, 0.3);
        }
        
        .resize-handle.resizing {
            background: rgba(0, 96, 114, 0.5);
        }
        
        /* Sidebar scrolling */
        .sidebar-sessions {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
        }
        
        .sidebar-sessions::-webkit-scrollbar {
            width: 6px;
        }
        
        .sidebar-sessions::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
        }
        
        .sidebar-sessions::-webkit-scrollbar-thumb {
            background: rgba(0, 96, 114, 0.3);
            border-radius: 3px;
        }
        
        .sidebar-sessions::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 96, 114, 0.5);
        }
        
        .session-item {
            transition: all 0.2s ease;
        }
        
        .session-item:hover {
            transform: translateX(4px);
        }
        
        .message-bubble {
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .typing-indicator span {
            animation: blink 1.4s infinite;
        }
        
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }
        
        .source-tag {
            transition: all 0.2s ease;
        }
        
        .source-tag:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        /* Scrollbar styling */
        .messages-container::-webkit-scrollbar {
            width: 6px;
        }
        
        .messages-container::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        .messages-container::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 3px;
        }
        
        .messages-container::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        
        /* Word wrapping and overflow handling */
        .break-words {
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
        }
        
        .overflow-wrap-anywhere {
            overflow-wrap: anywhere;
        }
        
        /* Ensure links break properly */
        a {
            word-break: break-all;
        }
        
        /* Enhanced animations */
        .slide-in {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        /* Glass effect */
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        /* Gradient text */
        .gradient-text {
            background: linear-gradient(135deg, #006072 0%, #FF6200 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Glow effect */
        .glow {
            box-shadow: 0 0 20px rgba(0, 96, 114, 0.3);
        }
        
        /* Scale utilities */
        .scale-102 {
            transform: scale(1.02);
        }
        
        /* Mobile responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 40;
                width: 280px !important;
                box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
            }
            
            .main-content {
                width: 100% !important;
            }
            
            .resize-handle {
                display: none;
            }
        }
        
        @media (max-width: 640px) {
            .sidebar {
                width: 100% !important;
                max-width: 100% !important;
            }
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Configuration
        const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://127.0.0.1:8000'  // Local development
            : 'https://wwf-poc.onrender.com';  // Production

        // Main Chat Component
        function ChatApp() {
            const [sessionId, setSessionId] = useState(null);
            const [userContext, setUserContext] = useState(null);
            const [messages, setMessages] = useState([]);
            const [sessions, setSessions] = useState([]);
            const [inputMessage, setInputMessage] = useState('');
            const [selectedLanguage, setSelectedLanguage] = useState('English');  // Language selector state
            const [isLoading, setIsLoading] = useState(false);
            const [isInitializing, setIsInitializing] = useState(true);
            const [error, setError] = useState(null);
            const [showSidebar, setShowSidebar] = useState(true);
            const messagesEndRef = useRef(null);

            // Auto-scroll to bottom
            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages]);

            // Fetch user sessions
            const fetchSessions = async (userId) => {
                try {
                    const response = await fetch(`${API_BASE_URL}/chatbot/sessions/${userId}`);
                    if (response.ok) {
                        const data = await response.json();
                        setSessions(data.sessions || []);
                    }
                } catch (err) {
                    console.error('Failed to fetch sessions:', err);
                }
            };

            // Load session history
            const loadSession = async (sessionIdToLoad) => {
                try {
                    setIsLoading(true);
                    const response = await fetch(`${API_BASE_URL}/chatbot/session/${sessionIdToLoad}/history`);
                    
                    if (!response.ok) throw new Error('Failed to load session history');
                    
                    const data = await response.json();
                    setSessionId(sessionIdToLoad);
                    setMessages(data.messages || []);
                } catch (err) {
                    console.error('Load session error:', err);
                    setError('Failed to load session history');
                } finally {
                    setIsLoading(false);
                }
            };

            // Create new chat session
            const createNewChat = async () => {
                try {
                    setIsLoading(true);
                    const response = await fetch(`${API_BASE_URL}/chatbot/session/init`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(userContext)
                    });

                    if (!response.ok) throw new Error('Failed to create new session');

                    const data = await response.json();
                    setSessionId(data.session_id);

                    // Add welcome message
                    setMessages([{
                        role: 'assistant',
                        content: data.welcome_message,
                        timestamp: new Date().toISOString(),
                        sources: []
                    }]);

                    // Refresh sessions list
                    await fetchSessions(userContext.user_id);
                } catch (err) {
                    console.error('Create new chat error:', err);
                    setError('Failed to create new chat session');
                } finally {
                    setIsLoading(false);
                }
            };

            // Close chat and return to launcher
            const closeChat = () => {
                window.close();
                // If window.close() doesn't work (new tab), redirect to launcher
                setTimeout(() => {
                    window.location.href = 'launcher.html';
                }, 100);
            };

            // Initialize session from URL parameters
            useEffect(() => {
                const initSession = async () => {
                    try {
                        // Get parameters from URL
                        const urlParams = new URLSearchParams(window.location.search);
                        
                        // Check if session_id is provided (Quickbase flow)
                        const existingSessionId = urlParams.get('session_id');
                        const userId = urlParams.get('user_id') || 'demo_user';
                        
                        if (existingSessionId) {
                            // Quickbase flow: Load existing session
                            console.log('[Chat] Loading existing session:', existingSessionId);
                            
                            // Load session history
                            const historyResponse = await fetch(`${API_BASE_URL}/chatbot/session/${existingSessionId}/history`);
                            if (!historyResponse.ok) throw new Error('Failed to load session');
                            
                            const historyData = await historyResponse.json();
                            setSessionId(existingSessionId);
                            setMessages(historyData.messages || []);
                            
                            // Set user context from backend response
                            const userCtx = historyData.user_context || {
                                user_id: userId,
                                name: urlParams.get('name') || 'User',
                                education: urlParams.get('education') || 'Professional',
                                location: urlParams.get('location') || 'Global'
                            };
                            setUserContext(userCtx);
                            
                            // Fetch user sessions
                            await fetchSessions(userId);
                            
                            setIsInitializing(false);
                        } else {
                            // Original flow: Create new session from user params
                            console.log('[Chat] Creating new session for user:', userId);
                            
                            const name = urlParams.get('name') || 'Demo User';
                            const education = urlParams.get('education') || 'Sustainability Professional';
                            const location = urlParams.get('location') || 'Global';

                            const userCtx = { user_id: userId, name, education, location };
                            setUserContext(userCtx);

                            // Initialize session with backend
                            const response = await fetch(`${API_BASE_URL}/chatbot/session/init`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(userCtx)
                            });

                            if (!response.ok) throw new Error('Failed to initialize session');

                            const data = await response.json();
                            setSessionId(data.session_id);

                            // Add welcome message
                            setMessages([{
                                role: 'assistant',
                                content: data.welcome_message,
                                timestamp: new Date().toISOString(),
                                sources: []
                            }]);

                            // Fetch user's chat sessions
                            await fetchSessions(userId);

                            setIsInitializing(false);
                        }
                    } catch (err) {
                        console.error('Initialization error:', err);
                        setError('Failed to initialize chat. Please refresh the page.');
                        setIsInitializing(false);
                    }
                };

                initSession();
            }, []);

            // Send message
            const sendMessage = async (e) => {
                e.preventDefault();
                if (!inputMessage.trim() || !sessionId) return;

                const userMessage = {
                    role: 'user',
                    content: inputMessage,
                    timestamp: new Date().toISOString()
                };

                setMessages(prev => [...prev, userMessage]);
                setInputMessage('');
                setIsLoading(true);

                try {
                    const response = await fetch(`${API_BASE_URL}/chatbot/message`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            session_id: sessionId,
                            user_id: userContext.user_id,
                            message: inputMessage,
                            language: selectedLanguage  // Include selected language
                        })
                    });

                    if (!response.ok) throw new Error('Failed to send message');

                    const data = await response.json();

                    const assistantMessage = {
                        role: 'assistant',
                        content: data.response,
                        timestamp: data.timestamp,
                        sources: data.sources || [],
                        agent_used: data.agent_used,
                        pdf_url: data.pdf_url
                    };

                    setMessages(prev => [...prev, assistantMessage]);
                } catch (err) {
                    console.error('Send message error:', err);
                    setMessages(prev => [...prev, {
                        role: 'assistant',
                        content: 'Sorry, I encountered an error. Please try again.',
                        timestamp: new Date().toISOString(),
                        sources: [],
                        isError: true
                    }]);
                } finally {
                    setIsLoading(false);
                }
            };

            if (isInitializing) {
                return (
                    <div className="flex items-center justify-center h-screen bg-gradient-to-br from-green-50 to-blue-50">
                        <div className="text-center">
                            <div className="inline-block animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-wwf-orange mb-4"></div>
                            <p className="text-gray-600 text-lg">Initializing WWF Assistant...</p>
                        </div>
                    </div>
                );
            }

            if (error) {
                return (
                    <div className="flex items-center justify-center h-screen bg-gradient-to-br from-red-50 to-orange-50">
                        <div className="bg-white p-8 rounded-lg shadow-lg max-w-md text-center">
                            <div className="text-red-500 text-5xl mb-4">⚠️</div>
                            <h2 className="text-2xl font-bold text-gray-800 mb-2">Connection Error</h2>
                            <p className="text-gray-600 mb-4">{error}</p>
                            <button 
                                onClick={() => window.location.reload()}
                                className="bg-wwf-orange text-white px-6 py-2 rounded-lg hover:bg-orange-600 transition"
                            >
                                Retry
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-screen bg-gray-50">
                    {/* Header */}
                    <header className="bg-gradient-to-r from-wwf-teal via-wwf-teal-dark to-wwf-teal shadow-lg relative overflow-hidden flex-shrink-0">
                        {/* Decorative gradient overlay */}
                        <div className="absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent"></div>
                        <div className="px-3 sm:px-6 py-3 flex items-center justify-between relative z-10">
                            <div className="flex items-center space-x-2 sm:space-x-4 slide-in flex-1">
                                <button
                                    onClick={() => setShowSidebar(!showSidebar)}
                                    className="p-2 hover:bg-white/10 rounded-lg transition-all duration-200 hover:scale-105"
                                    title="Toggle sidebar"
                                >
                                    <svg className="w-5 h-5 sm:w-6 sm:h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
                                    </svg>
                                </button>
                                <img src="wwf-logo-new.jpg" alt="WWF Logo" className="h-10 sm:h-12 w-auto" />
                                <div className="hidden sm:block">
                                    <h1 className="text-lg sm:text-xl font-bold text-white">WWF Sustainability Assistant</h1>
                                    <p className="text-xs text-white/90">Powered by AI • Real-time Knowledge</p>
                                </div>
                            </div>
                            <div className="flex items-center space-x-2 sm:space-x-4">
                                <div className="hidden md:block text-right">
                                    <p className="text-sm font-medium text-white">{userContext?.name}</p>
                                    <p className="text-xs text-white/80">{userContext?.location}</p>
                                </div>
                                <button
                                    onClick={createNewChat}
                                    className="bg-white/20 hover:bg-white/30 text-white px-3 sm:px-4 py-2 rounded-lg hover:shadow-lg transition-all duration-200 hover:scale-105 flex items-center space-x-1 sm:space-x-2"
                                    title="Start new chat"
                                >
                                    <svg className="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
                                    </svg>
                                    <span className="text-xs sm:text-sm font-medium hidden sm:inline">New Chat</span>
                                </button>
                                <button
                                    onClick={closeChat}
                                    className="p-2 hover:bg-red-500/80 rounded-lg transition-all duration-200 text-white hover:scale-105"
                                    title="Close chat"
                                >
                                    <svg className="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Main Content with Sidebar */}
                    <div className="flex flex-1 overflow-hidden">
                        {/* Sidebar - Chat History */}
                        {showSidebar && (
                            <div className="sidebar bg-white border-r border-gray-200 shadow-lg">
                                {/* Resize handle */}
                                <div 
                                    className="resize-handle"
                                    onMouseDown={(e) => {
                                        const sidebar = e.currentTarget.parentElement;
                                        const startX = e.clientX;
                                        const startWidth = sidebar.offsetWidth;
                                        e.currentTarget.classList.add('resizing');
                                        
                                        const doDrag = (e) => {
                                            const newWidth = startWidth + (e.clientX - startX);
                                            if (newWidth >= 250 && newWidth <= 500) {
                                                sidebar.style.width = newWidth + 'px';
                                            }
                                        };
                                        
                                        const stopDrag = () => {
                                            e.currentTarget.classList.remove('resizing');
                                            document.removeEventListener('mousemove', doDrag);
                                            document.removeEventListener('mouseup', stopDrag);
                                        };
                                        
                                        document.addEventListener('mousemove', doDrag);
                                        document.addEventListener('mouseup', stopDrag);
                                    }}
                                />
                                <div className="p-3 sm:p-4 border-b border-gray-200 bg-gradient-to-r from-wwf-teal/10 to-transparent flex-shrink-0">
                                    <h2 className="text-base sm:text-lg font-bold text-wwf-teal">Chat History</h2>
                                    <p className="text-xs text-gray-600">{sessions.length} conversation{sessions.length !== 1 ? 's' : ''}</p>
                                </div>
                                <div className="sidebar-sessions p-2 sm:p-3 space-y-2">
                                    {sessions.length === 0 ? (
                                        <p className="text-sm text-gray-400 text-center py-8">No chat history yet</p>
                                    ) : (
                                        sessions.map((session) => (
                                            <div
                                                key={session.session_id}
                                                onClick={() => loadSession(session.session_id)}
                                                className={`session-item p-3 rounded-lg cursor-pointer transition-all duration-200 ${
                                                    session.session_id === sessionId
                                                        ? 'bg-gradient-to-r from-wwf-orange to-orange-600 text-white shadow-lg scale-105'
                                                        : 'bg-white hover:bg-gradient-to-r hover:from-gray-50 hover:to-white text-gray-700 hover:shadow-md hover:scale-102 border border-gray-100'
                                                }`}
                                            >
                                                <div className="flex items-start justify-between">
                                                    <div className="flex-1">
                                                        <p className="text-sm font-medium truncate">
                                                            {session.preview || 'New conversation'}
                                                        </p>
                                                        <p className={`text-xs mt-1 ${
                                                            session.session_id === sessionId ? 'text-orange-100' : 'text-gray-500'
                                                        }`}>
                                                            {new Date(session.started_at).toLocaleDateString('en-US', {
                                                                month: 'short',
                                                                day: 'numeric',
                                                                hour: 'numeric',
                                                                minute: '2-digit'
                                                            })}
                                                        </p>
                                                    </div>
                                                    {session.session_id === sessionId && (
                                                        <svg className="w-5 h-5 flex-shrink-0 ml-2" fill="currentColor" viewBox="0 0 20 20">
                                                            <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" />
                                                        </svg>
                                                    )}
                                                </div>
                                                {session.message_count > 0 && (
                                                    <p className={`text-xs mt-2 ${
                                                        session.session_id === sessionId ? 'text-orange-100' : 'text-gray-400'
                                                    }`}>
                                                        {session.message_count} message{session.message_count !== 1 ? 's' : ''}
                                                    </p>
                                                )}
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}

                        {/* Chat Container */}
                        <div className="flex-1 flex flex-col overflow-hidden main-content">
                            <div className="flex-1 flex flex-col max-w-5xl w-full mx-auto px-3 sm:px-6 py-4 chat-container">
                        {/* Messages Area */}
                        <div className="messages-container space-y-3 sm:space-y-4 px-1 sm:px-2">
                            {messages.map((msg, idx) => (
                                <Message key={idx} message={msg} />
                            ))}
                            
                            {isLoading && <TypingIndicator />}
                            
                            <div ref={messagesEndRef} />
                        </div>

                        {/* Input Area */}
                        <div className="flex-shrink-0 pt-3">
                        <form onSubmit={sendMessage} className="bg-white rounded-xl sm:rounded-2xl shadow-lg border border-gray-200 p-3 sm:p-5">
                            {/* Language Selector */}
                            <div className="flex flex-col sm:flex-row items-start sm:items-center space-y-2 sm:space-y-0 sm:space-x-4 mb-3 sm:mb-4 pb-3 sm:pb-4 border-b border-gray-200">
                                <span className="text-xs sm:text-sm font-semibold text-gray-700 flex items-center">
                                    <svg className="w-3 h-3 sm:w-4 sm:h-4 mr-1 sm:mr-2 text-wwf-orange" fill="currentColor" viewBox="0 0 20 20">
                                        <path fillRule="evenodd" d="M7 2a1 1 0 011 1v1h3a1 1 0 110 2H9.578a18.87 18.87 0 01-1.724 4.78c.29.354.596.696.916 1.026a1 1 0 11-1.44 1.389c-.188-.196-.373-.396-.554-.6a19.098 19.098 0 01-3.107 3.567 1 1 0 01-1.334-1.49 17.087 17.087 0 003.13-3.733 18.992 18.992 0 01-1.487-2.494 1 1 0 111.79-.89c.234.47.489.928.764 1.372.417-.934.752-1.913.997-2.927H3a1 1 0 110-2h3V3a1 1 0 011-1zm6 6a1 1 0 01.894.553l2.991 5.982a.869.869 0 01.02.037l.99 1.98a1 1 0 11-1.79.894L15.383 16h-4.764l-.724 1.447a1 1 0 11-1.788-.894l.99-1.98.019-.038 2.99-5.982A1 1 0 0113 8zm-1.382 6h2.764L13 11.236 11.618 14z" clipRule="evenodd" />
                                    </svg>
                                    Language:
                                </span>
                                <div className="flex flex-wrap gap-2 sm:gap-4">
                                    {['English', 'French', 'German'].map(lang => (
                                        <label key={lang} className="flex items-center space-x-2 cursor-pointer group">
                                            <input
                                                type="radio"
                                                name="language"
                                                value={lang}
                                                checked={selectedLanguage === lang}
                                                onChange={(e) => setSelectedLanguage(e.target.value)}
                                                className="w-4 h-4 text-wwf-orange focus:ring-wwf-orange cursor-pointer"
                                            />
                                            <span className="text-sm font-medium text-gray-700 group-hover:text-wwf-orange transition-colors">{lang}</span>
                                        </label>
                                    ))}
                                </div>
                            </div>
                            
                            <div className="flex items-end space-x-2 sm:space-x-3">
                                <div className="flex-1">
                                    <textarea
                                        value={inputMessage}
                                        onChange={(e) => setInputMessage(e.target.value)}
                                        onKeyDown={(e) => {
                                            if (e.key === 'Enter' && !e.shiftKey) {
                                                e.preventDefault();
                                                sendMessage(e);
                                            }
                                        }}
                                        placeholder="Ask about sustainability..."
                                        className="w-full resize-none border-0 focus:ring-0 focus:outline-none text-sm sm:text-base text-gray-700 placeholder-gray-400 bg-transparent"
                                        rows="2"
                                        disabled={isLoading}
                                    />
                                </div>
                                <button
                                    type="submit"
                                    disabled={isLoading || !inputMessage.trim()}
                                    className="bg-gradient-to-r from-wwf-orange to-orange-600 text-white px-3 sm:px-6 py-2 sm:py-3 rounded-lg sm:rounded-xl font-semibold hover:shadow-lg hover:scale-105 transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100 flex items-center space-x-1 sm:space-x-2"
                                >
                                    {isLoading ? (
                                        <>
                                            <svg className="animate-spin h-4 w-4 sm:h-5 sm:w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                            </svg>
                                            <span className="hidden sm:inline text-sm">Sending...</span>
                                        </>
                                    ) : (
                                        <>
                                            <span className="text-sm">Send</span>
                                            <svg className="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                                            </svg>
                                        </>
                                    )}
                                </button>
                            </div>
                            <p className="text-xs text-gray-500 mt-2 sm:mt-3 flex items-center">
                                <svg className="w-3 h-3 mr-1 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                                    <path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clipRule="evenodd" />
                                </svg>
                                Press Enter to send, Shift+Enter for new line
                            </p>
                        </form>
                        </div>
                    </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Markdown to HTML converter
        function renderMarkdown(text) {
            if (!text) return '';
            
            // Convert **bold** to <strong>
            let html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            
            // Convert URLs to clickable links (before other conversions)
            // Match http(s) URLs
            html = html.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer" class="text-blue-600 hover:underline break-all">$1</a>');
            
            // Convert bullet points (• or -) to HTML lists
            html = html.replace(/^[•\-]\s+(.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>)/s, '<ul class="list-disc ml-5 my-2">$1</ul>');
            
            // Convert numbered lists (1., 2., etc.) to HTML
            html = html.replace(/^(\d+)\.\s+(.+)$/gm, '<li>$2</li>');
            html = html.replace(/(<li>.*<\/li>)/s, (match) => {
                if (!match.includes('<ul')) {
                    return '<ol class="list-decimal ml-5 my-2">' + match + '</ol>';
                }
                return match;
            });
            
            // Convert line breaks
            html = html.replace(/\n\n/g, '</p><p class="mt-3">');
            html = html.replace(/\n/g, '<br>');
            
            // Wrap in paragraph
            html = '<p>' + html + '</p>';
            
            return html;
        }

        // Message Component
        function Message({ message }) {
            const isUser = message.role === 'user';

            return (
                <div className={`flex ${isUser ? 'justify-end' : 'justify-start'} message-bubble`}>
                    <div className={`max-w-3xl ${isUser ? 'order-1' : 'order-2'}`}>
                        <div className={`rounded-2xl px-5 py-4 shadow-lg ${
                            isUser 
                                ? 'bg-gradient-to-br from-wwf-teal to-wwf-teal-dark text-white glow' 
                                : message.isError
                                    ? 'bg-red-50 border border-red-200 text-red-800'
                                    : 'bg-white border border-gray-100 text-gray-800 shadow-xl hover:shadow-2xl transition-shadow duration-300'
                        }`}>
                            <div className="leading-relaxed break-words overflow-wrap-anywhere" dangerouslySetInnerHTML={{ __html: renderMarkdown(message.content) }} />
                            
                            {/* Agent Badge */}
                            {!isUser && message.agent_used && (
                                <div className="mt-3 pt-3 border-t border-gray-200">
                                    <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${
                                        message.agent_used === 'rag' ? 'bg-blue-100 text-blue-800' :
                                        message.agent_used === 'web_search' ? 'bg-green-100 text-green-800' :
                                        message.agent_used === 'hybrid' ? 'bg-purple-100 text-purple-800' :
                                        message.agent_used === 'greeting' ? 'bg-gray-100 text-gray-800' :
                                        message.agent_used === 'invalid_query' ? 'bg-yellow-100 text-yellow-800' :
                                        'bg-orange-100 text-orange-800'
                                    }`}>
                                        {message.agent_used === 'rag' ? '📚 Knowledge Base' :
                                         message.agent_used === 'web_search' ? '🌐 Web Search' :
                                         message.agent_used === 'hybrid' ? '🔀 Hybrid (KB + Web)' :
                                         message.agent_used === 'greeting' ? '👋 Greeting' :
                                         message.agent_used === 'invalid_query' ? '⚠️ Clarification Needed' :
                                         '📄 PDF Export'}
                                    </span>
                                </div>
                            )}
                            
                            {/* Sources */}
                            {!isUser && message.sources && message.sources.length > 0 && (
                                <div className="mt-3 pt-3 border-t border-gray-200">
                                    <p className="text-xs font-semibold text-gray-600 mb-2">Sources:</p>
                                    <div className="space-y-2">
                                        {message.sources.map((source, idx) => (
                                            <div key={idx} className="source-tag flex items-start space-x-2 bg-gray-50 rounded-lg p-2 text-xs">
                                                <span className="font-bold text-wwf-orange">{idx + 1}.</span>
                                                <div className="flex-1">
                                                    <p className="font-medium text-gray-700">{source.title}</p>
                                                    {source.url && (
                                                        <a href={source.url} target="_blank" rel="noopener noreferrer" 
                                                           className="text-blue-600 hover:underline break-all">
                                                            {source.url}
                                                        </a>
                                                    )}
                                                    <p className="text-gray-500 mt-1">{source.excerpt}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                            
                            {/* PDF Download Link */}
                            {!isUser && message.pdf_url && (
                                <div className="mt-3 pt-3 border-t border-gray-200">
                                    <a 
                                        href={`${API_BASE_URL}${message.pdf_url}`}
                                        download
                                        className="inline-flex items-center space-x-2 bg-wwf-orange text-white px-4 py-2 rounded-lg hover:bg-orange-600 transition text-sm font-medium"
                                    >
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                        </svg>
                                        <span>Download PDF</span>
                                    </a>
                                </div>
                            )}
                        </div>
                        
                        <p className="text-xs text-gray-400 mt-1 px-2">
                            {new Date(message.timestamp).toLocaleTimeString('en-US', { 
                                hour: 'numeric', 
                                minute: '2-digit',
                                hour12: true 
                            })}
                        </p>
                    </div>
                </div>
            );
        }

        // Typing Indicator
        function TypingIndicator() {
            return (
                <div className="flex justify-start">
                    <div className="bg-white shadow-md border border-gray-200 rounded-2xl px-5 py-4">
                        <div className="typing-indicator flex space-x-1">
                            <span className="w-2 h-2 bg-gray-400 rounded-full"></span>
                            <span className="w-2 h-2 bg-gray-400 rounded-full"></span>
                            <span className="w-2 h-2 bg-gray-400 rounded-full"></span>
                        </div>
                    </div>
                </div>
            );
        }

        // Render App
        ReactDOM.render(<ChatApp />, document.getElementById('root'));
    </script>
</body>
</html>
