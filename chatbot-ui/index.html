<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WWF Sustainability Assistant</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Custom Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'wwf-orange': '#FF6200',
                        'wwf-black': '#000000',
                        'wwf-green': '#2C5F2D',
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .chat-container {
            height: calc(100vh - 80px);
        }
        
        .messages-container {
            height: calc(100% - 120px);
        }
        
        .message-bubble {
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .typing-indicator span {
            animation: blink 1.4s infinite;
        }
        
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }
        
        .source-tag {
            transition: all 0.2s ease;
        }
        
        .source-tag:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        /* Scrollbar styling */
        .messages-container::-webkit-scrollbar {
            width: 6px;
        }
        
        .messages-container::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        .messages-container::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 3px;
        }
        
        .messages-container::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Configuration
        const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://127.0.0.1:8000'  // Local development
            : 'https://wwf-poc.onrender.com';  // Production

        // Main Chat Component
        function ChatApp() {
            const [sessionId, setSessionId] = useState(null);
            const [userContext, setUserContext] = useState(null);
            const [messages, setMessages] = useState([]);
            const [inputMessage, setInputMessage] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [isInitializing, setIsInitializing] = useState(true);
            const [error, setError] = useState(null);
            const messagesEndRef = useRef(null);

            // Auto-scroll to bottom
            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages]);

            // Initialize session from URL parameters
            useEffect(() => {
                const initSession = async () => {
                    try {
                        // Get user context from URL parameters
                        const urlParams = new URLSearchParams(window.location.search);
                        const userId = urlParams.get('user_id') || 'demo_user';
                        const name = urlParams.get('name') || 'Demo User';
                        const education = urlParams.get('education') || 'Sustainability Professional';
                        const location = urlParams.get('location') || 'Global';

                        const userCtx = { user_id: userId, name, education, location };
                        setUserContext(userCtx);

                        // Initialize session with backend
                        const response = await fetch(`${API_BASE_URL}/chatbot/session/init`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(userCtx)
                        });

                        if (!response.ok) throw new Error('Failed to initialize session');

                        const data = await response.json();
                        setSessionId(data.session_id);

                        // Add welcome message
                        setMessages([{
                            role: 'assistant',
                            content: data.welcome_message,
                            timestamp: new Date().toISOString(),
                            sources: []
                        }]);

                        setIsInitializing(false);
                    } catch (err) {
                        console.error('Initialization error:', err);
                        setError('Failed to initialize chat. Please refresh the page.');
                        setIsInitializing(false);
                    }
                };

                initSession();
            }, []);

            // Send message
            const sendMessage = async (e) => {
                e.preventDefault();
                if (!inputMessage.trim() || !sessionId) return;

                const userMessage = {
                    role: 'user',
                    content: inputMessage,
                    timestamp: new Date().toISOString()
                };

                setMessages(prev => [...prev, userMessage]);
                setInputMessage('');
                setIsLoading(true);

                try {
                    const response = await fetch(`${API_BASE_URL}/chatbot/message`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            session_id: sessionId,
                            user_id: userContext.user_id,
                            message: inputMessage
                        })
                    });

                    if (!response.ok) throw new Error('Failed to send message');

                    const data = await response.json();

                    const assistantMessage = {
                        role: 'assistant',
                        content: data.response,
                        timestamp: data.timestamp,
                        sources: data.sources || [],
                        agent_used: data.agent_used,
                        pdf_url: data.pdf_url
                    };

                    setMessages(prev => [...prev, assistantMessage]);
                } catch (err) {
                    console.error('Send message error:', err);
                    setMessages(prev => [...prev, {
                        role: 'assistant',
                        content: 'Sorry, I encountered an error. Please try again.',
                        timestamp: new Date().toISOString(),
                        sources: [],
                        isError: true
                    }]);
                } finally {
                    setIsLoading(false);
                }
            };

            if (isInitializing) {
                return (
                    <div className="flex items-center justify-center h-screen bg-gradient-to-br from-green-50 to-blue-50">
                        <div className="text-center">
                            <div className="inline-block animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-wwf-orange mb-4"></div>
                            <p className="text-gray-600 text-lg">Initializing WWF Assistant...</p>
                        </div>
                    </div>
                );
            }

            if (error) {
                return (
                    <div className="flex items-center justify-center h-screen bg-gradient-to-br from-red-50 to-orange-50">
                        <div className="bg-white p-8 rounded-lg shadow-lg max-w-md text-center">
                            <div className="text-red-500 text-5xl mb-4">⚠️</div>
                            <h2 className="text-2xl font-bold text-gray-800 mb-2">Connection Error</h2>
                            <p className="text-gray-600 mb-4">{error}</p>
                            <button 
                                onClick={() => window.location.reload()}
                                className="bg-wwf-orange text-white px-6 py-2 rounded-lg hover:bg-orange-600 transition"
                            >
                                Retry
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-screen bg-gradient-to-br from-green-50 via-white to-blue-50">
                    {/* Header */}
                    <header className="bg-white shadow-md border-b-4 border-wwf-orange">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
                            <div className="flex items-center space-x-3">
                                <img src="wwf-logo-new.jpg" alt="WWF Logo" style={{height: '60px', width: 'auto'}} />
                                <div>
                                    <h1 className="text-2xl font-bold text-gray-800">WWF Sustainability Assistant</h1>
                                    <p className="text-sm text-gray-500">Powered by AI • Real-time Knowledge</p>
                                </div>
                            </div>
                            <div className="text-right">
                                <p className="text-sm font-medium text-gray-700">{userContext?.name}</p>
                                <p className="text-xs text-gray-500">{userContext?.location}</p>
                            </div>
                        </div>
                    </header>

                    {/* Chat Container */}
                    <div className="flex-1 max-w-5xl w-full mx-auto px-4 py-6 chat-container">
                        {/* Messages Area */}
                        <div className="messages-container overflow-y-auto space-y-4 mb-4 px-2">
                            {messages.map((msg, idx) => (
                                <Message key={idx} message={msg} />
                            ))}
                            
                            {isLoading && <TypingIndicator />}
                            
                            <div ref={messagesEndRef} />
                        </div>

                        {/* Input Area */}
                        <form onSubmit={sendMessage} className="bg-white rounded-xl shadow-lg border border-gray-200 p-4">
                            <div className="flex items-end space-x-3">
                                <div className="flex-1">
                                    <textarea
                                        value={inputMessage}
                                        onChange={(e) => setInputMessage(e.target.value)}
                                        onKeyDown={(e) => {
                                            if (e.key === 'Enter' && !e.shiftKey) {
                                                e.preventDefault();
                                                sendMessage(e);
                                            }
                                        }}
                                        placeholder="Ask about sustainability, WWF initiatives, circular economy..."
                                        className="w-full resize-none border-0 focus:ring-0 focus:outline-none text-gray-700 placeholder-gray-400"
                                        rows="2"
                                        disabled={isLoading}
                                    />
                                </div>
                                <button
                                    type="submit"
                                    disabled={isLoading || !inputMessage.trim()}
                                    className="bg-wwf-orange text-white px-6 py-3 rounded-lg font-medium hover:bg-orange-600 transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center space-x-2"
                                >
                                    <span>{isLoading ? 'Sending...' : 'Send'}</span>
                                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                                    </svg>
                                </button>
                            </div>
                            <p className="text-xs text-gray-400 mt-2">Press Enter to send, Shift+Enter for new line</p>
                        </form>
                    </div>
                </div>
            );
        }

        // Message Component
        function Message({ message }) {
            const isUser = message.role === 'user';

            return (
                <div className={`flex ${isUser ? 'justify-end' : 'justify-start'} message-bubble`}>
                    <div className={`max-w-3xl ${isUser ? 'order-1' : 'order-2'}`}>
                        <div className={`rounded-2xl px-5 py-4 ${
                            isUser 
                                ? 'bg-wwf-green text-white' 
                                : message.isError
                                    ? 'bg-red-50 border border-red-200 text-red-800'
                                    : 'bg-white shadow-md border border-gray-200 text-gray-800'
                        }`}>
                            <p className="whitespace-pre-wrap leading-relaxed">{message.content}</p>
                            
                            {/* Agent Badge */}
                            {!isUser && message.agent_used && (
                                <div className="mt-3 pt-3 border-t border-gray-200">
                                    <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${
                                        message.agent_used === 'rag' ? 'bg-blue-100 text-blue-800' :
                                        message.agent_used === 'web_search' ? 'bg-green-100 text-green-800' :
                                        message.agent_used === 'hybrid' ? 'bg-purple-100 text-purple-800' :
                                        'bg-orange-100 text-orange-800'
                                    }`}>
                                        {message.agent_used === 'rag' ? '📚 Knowledge Base' :
                                         message.agent_used === 'web_search' ? '🌐 Web Search' :
                                         message.agent_used === 'hybrid' ? '🔀 Hybrid (KB + Web)' :
                                         '📄 PDF Export'}
                                    </span>
                                </div>
                            )}
                            
                            {/* Sources */}
                            {!isUser && message.sources && message.sources.length > 0 && (
                                <div className="mt-3 pt-3 border-t border-gray-200">
                                    <p className="text-xs font-semibold text-gray-600 mb-2">Sources:</p>
                                    <div className="space-y-2">
                                        {message.sources.map((source, idx) => (
                                            <div key={idx} className="source-tag flex items-start space-x-2 bg-gray-50 rounded-lg p-2 text-xs">
                                                <span className="font-bold text-wwf-orange">{idx + 1}.</span>
                                                <div className="flex-1">
                                                    <p className="font-medium text-gray-700">{source.title}</p>
                                                    {source.url && (
                                                        <a href={source.url} target="_blank" rel="noopener noreferrer" 
                                                           className="text-blue-600 hover:underline break-all">
                                                            {source.url}
                                                        </a>
                                                    )}
                                                    <p className="text-gray-500 mt-1">{source.excerpt}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                            
                            {/* PDF Download Link */}
                            {!isUser && message.pdf_url && (
                                <div className="mt-3 pt-3 border-t border-gray-200">
                                    <a 
                                        href={`${API_BASE_URL}${message.pdf_url}`}
                                        download
                                        className="inline-flex items-center space-x-2 bg-wwf-orange text-white px-4 py-2 rounded-lg hover:bg-orange-600 transition text-sm font-medium"
                                    >
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                        </svg>
                                        <span>Download PDF</span>
                                    </a>
                                </div>
                            )}
                        </div>
                        
                        <p className="text-xs text-gray-400 mt-1 px-2">
                            {new Date(message.timestamp).toLocaleTimeString('en-US', { 
                                hour: 'numeric', 
                                minute: '2-digit',
                                hour12: true 
                            })}
                        </p>
                    </div>
                </div>
            );
        }

        // Typing Indicator
        function TypingIndicator() {
            return (
                <div className="flex justify-start">
                    <div className="bg-white shadow-md border border-gray-200 rounded-2xl px-5 py-4">
                        <div className="typing-indicator flex space-x-1">
                            <span className="w-2 h-2 bg-gray-400 rounded-full"></span>
                            <span className="w-2 h-2 bg-gray-400 rounded-full"></span>
                            <span className="w-2 h-2 bg-gray-400 rounded-full"></span>
                        </div>
                    </div>
                </div>
            );
        }

        // Render App
        ReactDOM.render(<ChatApp />, document.getElementById('root'));
    </script>
</body>
</html>
